# split_v4_merged.yaml
# 6-class domain-agnostic taxonomy.
# All domain variants merged into single semantic classes.
# Part-level classes (head, torso) kept separate due to different bbox geometry.
#
# Since base_remap collapses both RGB and thermal into the same class,
# thermal augment variants don't need any additional remapping —
# the class is already unified.

source_split: split_v1_baseline
split_name: split_v1_v4_merged

classes:
  - boat            # 0  (boat-rgb + boat-thermal)
  - vessel          # 1  (vessel-rgb + vessel-thermal)
  - human           # 2  (human-rgb + human-thermal)
  - outboard motor  # 3  (outboard motor-rgb + outboard motor-thermal)
  - head            # 4  (head-rgb + head-thermal)
  - torso           # 5  (torso-rgb + torso-thermal)

# Maps data10 class IDs → v4 class IDs.
# Applied to ALL variants (original, dark, thermal) — no separate thermal_remap needed.
base_remap:
  0: 0   # boat-rgb             → boat
  1: 4   # human head           → head
  2: 5   # human torso          → torso
  3: 3   # outboard motor-rgb   → outboard motor
  4: 0   # boat (thermal)       → boat
  5: 2   # human (thermal)      → human
  6: 3   # outboard motor (thermal) → outboard motor
  7: 2   # human-rgb            → human
  8: 1   # vessel (thermal)     → vessel
  9: 1   # vessel-rgb           → vessel

# No thermal_remap needed — base_remap already unifies domains.
thermal_remap: {}
