# split_v6_merged.yaml
# 6-class domain-agnostic taxonomy on split_v5 base (all sources in train/val, no test holdout).
# Offline-expanded via augment_split.py (5 augmentation variants per training image).
#
# Test set will be added separately when new labelled data is available.

source_split: split_v5_merged
split_name: split_v6_merged

classes:
  - boat            # 0  (boat-rgb + boat-thermal)
  - head            # 1  (human head)
  - torso           # 2  (human torso)
  - outboard motor  # 3  (outboard motor-rgb + outboard motor-thermal)
  - human           # 4  (human-rgb + human-thermal)
  - vessel          # 5  (vessel-rgb + vessel-thermal)

# Maps data10 class IDs -> v6 class IDs.
# Source labels are symlinks to data10 and still use original 10-class IDs.
base_remap:
  0: 0   # boat-rgb             -> boat
  1: 1   # human head           -> head
  2: 2   # human torso          -> torso
  3: 3   # outboard motor-rgb   -> outboard motor
  4: 0   # boat (thermal)       -> boat
  5: 4   # human (thermal)      -> human
  6: 3   # outboard motor (thermal) -> outboard motor
  7: 4   # human-rgb            -> human
  8: 5   # vessel (thermal)     -> vessel
  9: 5   # vessel-rgb           -> vessel

# No thermal_remap — base_remap already unifies domains.
thermal_remap: {}
